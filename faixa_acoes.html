<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faixa de Ações Rolante com Finnhub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding-top: 20px;
            padding-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .ticker-container-wrapper {
            width: 100%;
            max-width: 1200px;
            background-color: #1e1e1e;
            color: #ffffff;
            overflow: hidden;
            padding: 12px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .ticker-tape {
            display: flex;
            white-space: nowrap;
        }

        .stock-item {
            display: inline-flex;
            align-items: center;
            padding: 0 20px;
            font-size: 15px;
            height: 30px;
            border-right: 1px solid #444;
        }

        .stock-symbol {
            font-weight: bold;
            margin-right: 10px;
            color: #bbbbbb;
        }

        .stock-price {
            margin-right: 10px;
            color: #ffffff;
        }

        .stock-change-container {
            display: flex;
            align-items: center;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .positive {
            background-color: #0b873c;
            color: #ffffff;
        }

        .negative {
            background-color: #d92e2e;
            color: #ffffff;
        }

        .arrow {
            margin-right: 4px;
            font-size: 14px;
        }

        @keyframes scrollTicker {
            0% {
                transform: translateX(0%);
            }
            100% {
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>

<div class="ticker-container-wrapper">
    <div class="ticker-tape" id="tickerTape">
    </div>
</div>

<script>
    const finnhubApiKey = "d0s785pr01qkkpltdqh0d0s785pr01qkkpltdqhg";
    const nasdaqSymbols = ["AAPL", "MSFT", "AMZN", "NVDA", "GOOGL", "META", "TSLA", "AVGO", "COST", "ADBE"];
    let previousData = {};
    const REFRESH_INTERVAL = 30000;
    let isTickerInitialized = false;

    const tickerTapeElement = document.getElementById('tickerTape');

    function createStockItemHTML(symbol, data) {
        const currentData = data || { price: undefined, percentChange: undefined };
        const price = currentData.price !== undefined ? `$${Number(currentData.price).toFixed(2)}` : 'Carregando...';
        let percentChangeStr = currentData.percentChange !== undefined ? `${Number(currentData.percentChange).toFixed(2)}%` : '...';
        let changeClass = '';
        let arrow = '';

        if (currentData.percentChange !== undefined) {
            const pc = Number(currentData.percentChange);
            if (pc > 0) {
                changeClass = 'positive';
                arrow = '▲';
                percentChangeStr = `+${percentChangeStr}`;
            } else if (pc < 0) {
                changeClass = 'negative';
                arrow = '▼';
            }
        }

        return `
            <div class="stock-item" data-symbol="${symbol}">
                <span class="stock-symbol">${symbol}</span>
                <span class="stock-price">${price}</span>
                <div class="stock-change-container ${changeClass}">
                    <span class="arrow">${arrow}</span>
                    <span class="stock-change">${percentChangeStr}</span>
                </div>
            </div>
        `;
    }

    function initializeTicker() {
        if (isTickerInitialized) {
            return;
        }

        let originalItemsHTML = '';
        nasdaqSymbols.forEach(symbol => {
            originalItemsHTML += createStockItemHTML(symbol, previousData[symbol]);
        });

        const tempOriginalContainer = document.createElement('div');
        tempOriginalContainer.style.display = 'flex';
        tempOriginalContainer.style.visibility = 'hidden';
        tempOriginalContainer.style.position = 'absolute';
        tempOriginalContainer.innerHTML = originalItemsHTML;
        document.body.appendChild(tempOriginalContainer);

        let singleSetWidth = 0;
        Array.from(tempOriginalContainer.children).forEach(item => {
            singleSetWidth += item.offsetWidth;
        });
        document.body.removeChild(tempOriginalContainer);

        tickerTapeElement.innerHTML = originalItemsHTML + originalItemsHTML;

        if (singleSetWidth > 0) {
            const animationSpeedPxPerSec = 50;
            const animationDuration = singleSetWidth / animationSpeedPxPerSec;
            tickerTapeElement.style.animation = `scrollTicker ${animationDuration}s linear infinite`;
        } else {
            tickerTapeElement.style.animation = `scrollTicker 60s linear infinite`;
        }
        isTickerInitialized = true;
    }

    function updateTickerDisplays() {
        if (!isTickerInitialized) return;

        nasdaqSymbols.forEach(symbol => {
            const data = previousData[symbol];
            if (data) {
                const itemsToUpdate = document.querySelectorAll(`.stock-item[data-symbol="${symbol}"]`);
                itemsToUpdate.forEach(itemElement => {
                    const priceElement = itemElement.querySelector(".stock-price");
                    const changeContainerElement = itemElement.querySelector(".stock-change-container");
                    const arrowElement = itemElement.querySelector(".arrow");
                    const changeValueElement = itemElement.querySelector(".stock-change");

                    if (priceElement) priceElement.textContent = data.price !== undefined ? `$${Number(data.price).toFixed(2)}` : 'Carregando...';
                    
                    let percentChangeStr = data.percentChange !== undefined ? `${Number(data.percentChange).toFixed(2)}%` : '...';
                    let changeClass = '';
                    let arrow = '';

                    if (data.percentChange !== undefined) {
                        const pc = Number(data.percentChange);
                        if (pc > 0) {
                            changeClass = 'positive';
                            arrow = '▲';
                            percentChangeStr = `+${percentChangeStr}`;
                        } else if (pc < 0) {
                            changeClass = 'negative';
                            arrow = '▼';
                        }
                    }

                    if (changeContainerElement) changeContainerElement.className = `stock-change-container ${changeClass}`;
                    if (arrowElement) arrowElement.textContent = arrow;
                    if (changeValueElement) changeValueElement.textContent = percentChangeStr;
                });
            }
        });
    }

    async function fetchStockData() {
        const apiKeyMissing = (finnhubApiKey === "SUA_CHAVE_FINNHUB_API" || !finnhubApiKey);

        if (apiKeyMissing) {
            if (!isTickerInitialized) {
                 nasdaqSymbols.forEach((symbol) => {
                    if (!previousData[symbol]) {
                        previousData[symbol] = {
                            price: (100 + Math.random() * 300).toFixed(2),
                            percentChange: (Math.random() * 4 - 2).toFixed(2)
                        };
                    }
                });
                initializeTicker();
            } else {
                nasdaqSymbols.forEach((symbol) => { // Garante que placeholders existam se previousData estiver vazio
                    if (!previousData[symbol]) {
                        previousData[symbol] = {
                            price: (100 + Math.random() * 300).toFixed(2),
                            percentChange: (Math.random() * 4 - 2).toFixed(2)
                        };
                    }
                });
                updateTickerDisplays();
            }
            return;
        }

        if (!isTickerInitialized) {
             initializeTicker();
        }

        let newOverallData = {};
        for (const symbol of nasdaqSymbols) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${finnhubApiKey}`);
                if (!response.ok) {
                    if(previousData[symbol]) newOverallData[symbol] = previousData[symbol];
                    continue;
                }
                const data = await response.json();

                if (data && data.c !== undefined && data.dp !== undefined) {
                    newOverallData[symbol] = { price: data.c, percentChange: data.dp };
                } else {
                    if(previousData[symbol]) newOverallData[symbol] = previousData[symbol];
                }
            } catch (error) {
                if(previousData[symbol]) newOverallData[symbol] = previousData[symbol];
            }
        }
        previousData = {...previousData, ...newOverallData};
        updateTickerDisplays();
    }

    // Bloco de Inicialização Principal
    if (finnhubApiKey === "SUA_CHAVE_FINNHUB_API" || !finnhubApiKey) {
        nasdaqSymbols.forEach((symbol) => {
            if (!previousData[symbol]) {
                 previousData[symbol] = {
                    price: (100 + Math.random() * 300).toFixed(2),
                    percentChange: (Math.random() * 4 - 2).toFixed(2)
                };
            }
        });
    }

    initializeTicker();
    fetchStockData();
    setInterval(fetchStockData, REFRESH_INTERVAL);
</script>

</body>
</html>
