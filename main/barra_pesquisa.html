<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pesquisar Páginas</title>
  <style>
    input {
      padding: 8px;
      width: 300px;
      margin-bottom: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 5px 0;
    }
  </style>
</head>
<body>

  <h2>Buscar Página</h2>
  <input type="text" id="pesquisa" placeholder="Digite algo como 'notícia' ou 'gráfico'...">
  <ul id="resultados"></ul>

  <script>
    const paginas = [
      { titulo: "Gráfico Dinâmico", url: "grafico_dinamico.html" },
      { titulo: "Heatmap", url: "heatmap front.html" },
      { titulo: "Notícia", url: "noticia.html" },
      { titulo: "Sobre Nós", url: "sobre nós.html" },
      { titulo: "Top Perdedores", url: "top-perdedores.html" },
      { titulo: "Top Vencedores", url: "top-vencedores.html" }
    ];

    const input = document.getElementById('pesquisa');
    const lista = document.getElementById('resultados');

    input.addEventListener('input', () => {
      const termo = input.value.toLowerCase();
      lista.innerHTML = '';

      const filtradas = paginas.filter(p => p.titulo.toLowerCase().includes(termo));

      filtradas.forEach(pagina => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = pagina.url;
        a.textContent = pagina.titulo;
        li.appendChild(a);
        lista.appendChild(li);
      });

      if (filtradas.length === 0 && termo.length > 0) {
        lista.innerHTML = '<li>Nenhuma página encontrada.</li>';
      }
    });
  </script>

</body>
</html>
